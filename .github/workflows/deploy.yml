name: Deploy Lab

on:
  workflow_dispatch:
    inputs:
      lab_url:
        description: 'Lab URL'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      region:
        description: 'Specific region (leave empty for multi-region)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id }}
          LOG_BOT_TOKEN: ${{ secrets.LOG_BOT_TOKEN }}
          LAB_URL: ${{ github.event.inputs.lab_url }}
          REGION_OVERRIDE: ${{ github.event.inputs.region }}
        run: python main.py
