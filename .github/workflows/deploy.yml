name: Google Skills Automation

on:
  workflow_dispatch:
    inputs:
      lab_url:
        description: 'رابط اللاب (Google Skills)'
        required: true
        type: string
        default: 'https://www.skills.google/focuses/19146?parent=catalog'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Download Buster Extension
        run: |
          if [ ! -f "buster-main.zip" ]; then
            wget -q -O buster-main.zip https://github.com/dessant/buster/archive/refs/heads/main.zip
          fi

      - name: Run Playwright Script
        env:
          LAB_URL: ${{ github.event.inputs.lab_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
