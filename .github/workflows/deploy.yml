name: Auto VLESS Deploy

on:
  workflow_dispatch:
    inputs:
      lab_url:
        description: 'Qwiklabs URL'
        required: true
        type: string
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 7 # ⏱️ تم التعديل: إيقاف إجباري بعد 5 دقائق بالضبط

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Playwright Script
        env:
          LAB_URL: ${{ github.event.inputs.lab_url }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          LOG_BOT_TOKEN: ${{ secrets.LOG_BOT_TOKEN }}

        run: python main.py
